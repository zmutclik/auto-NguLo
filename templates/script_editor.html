{% extends "base.html" %}
{% block title %}Script Editor{% endblock %}
{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
    .sortable-ghost { opacity: 0.4; background: #312E81 !important; border: 2px dashed #6366F1 !important; border-radius: 12px; }
    .sortable-chosen { box-shadow: 0 0 20px rgba(99,102,241,0.4); }
    .drag-handle { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }
    .action-card { transition: all 0.2s ease; }
    .action-card:hover { border-color: #6366F1; }
    @keyframes slideDown { from { opacity:0; max-height:0; } to { opacity:1; max-height:500px; } }
    .animate-slide { animation: slideDown 0.3s ease-out; }
</style>
{% endblock %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
    <a href="/dashboard" class="text-slate-400 hover:text-slate-200 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-xl font-bold" x-text="isNew ? '➕ New Script' : '✏️ Edit Script'"></h1>
</div>

<div id="script-editor-root" data-script-id="{{ script_id or '' }}" x-data="scriptEditor()" x-init="init()" class="grid lg:grid-cols-3 gap-6">

    <!-- LEFT: Script Info -->
    <div class="lg:col-span-1">
        <div class="bg-surface-card border border-surface-border rounded-2xl p-6 sticky top-24">
            <h2 class="font-semibold mb-5 flex items-center gap-2"><span class="w-7 h-7 rounded-lg bg-brand/10 flex items-center justify-center">📋</span> Script Info</h2>
            <div class="mb-4">
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Name *</label>
                <input x-model="script.name" type="text" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Description</label>
                <textarea x-model="script.description" rows="2" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand resize-none"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Repeat Count</label>
                <input x-model.number="script.repeat_count" type="number" min="1" max="999" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Delay Between Actions (ms)</label>
                <input x-model.number="script.delay_between_ms" type="number" min="0" max="60000" step="100" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand">
            </div>
            <button @click="save()" class="w-full bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-4 py-3 transition-all shadow-lg shadow-brand/25 text-sm">💾 <span x-text="isNew ? 'Create Script' : 'Save Changes'"></span></button>
            <div class="mt-6 pt-4 border-t border-surface-border">
                <div class="flex items-center justify-between text-sm"><span class="text-slate-400">Actions</span><span class="text-brand font-bold" x-text="actions.length + ' actions'"></span></div>
            </div>
        </div>
    </div>

    <!-- RIGHT: Actions -->
    <div class="lg:col-span-2 space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="font-semibold flex items-center gap-2"><span class="w-7 h-7 rounded-lg bg-success/10 flex items-center justify-center">⚡</span> Actions</h2>
            <button @click="addAction()" class="inline-flex items-center gap-1.5 bg-success hover:bg-green-600 text-white text-sm font-semibold rounded-lg px-4 py-2.5 transition-colors shadow-sm shadow-success/20">＋ Add Action</button>
        </div>

        <div id="actions-list" class="space-y-3">
            <template x-for="(a, idx) in actions" :key="a._id">
                <div :data-id="a._id" class="action-card bg-surface-card border border-surface-border rounded-xl overflow-hidden group">
                    <div class="flex items-center gap-3 p-4 cursor-pointer" @click="a._expanded = !a._expanded">
                        <span class="drag-handle text-slate-600 group-hover:text-slate-400 shrink-0"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6h2v2H8V6zm6 0h2v2h-2V6zM8 11h2v2H8v-2zm6 0h2v2h-2v-2zm-6 5h2v2H8v-2zm6 0h2v2h-2v-2z"/></svg></span>
                        <span class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-xs text-slate-400 font-mono shrink-0" x-text="idx+1"></span>
                        <span x-text="typeIcon(a.action_type)" class="text-lg"></span>
                        <div class="flex-1 min-w-0">
                            <span class="text-sm font-medium text-slate-200" x-text="a.action_type + ' [' + a.name + ']'"></span>
                        </div>
                        <svg :class="a._expanded ? 'rotate-180' : ''" class="w-4 h-4 text-slate-500 transition-transform shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>

                    <div x-show="a._expanded" x-transition class="border-t border-surface-border bg-slate-900/50 px-4 py-4 animate-slide">
                        <div class="mb-3">
                            <label class="block text-xs font-medium text-slate-400 mb-1">Name <span class="text-slate-500">(lowercase_underscore)</span></label>
                            <input x-model="a.name" type="text" @input="a.name = a.name.toLowerCase().replace(/[^a-z0-9_]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 font-mono focus:outline-none focus:ring-2 focus:ring-brand">
                        </div>
                        <div class="mb-3">
                            <label class="block text-xs font-medium text-slate-500 mb-2">Action Type</label>
                            <div class="grid grid-cols-5 gap-1.5">
                                <template x-for="t in actionTypes" :key="t">
                                    <button @click="a.action_type = t" :class="a.action_type === t ? 'bg-brand text-white border-brand' : 'bg-slate-800 border-surface-border text-slate-400 hover:border-brand'" class="border rounded-lg p-1.5 text-xs text-center transition-all leading-tight"><span x-text="typeIcon(t)"></span><br><span x-text="t.replace('screenshot_','').replace('long_','long').replace('type_','type')"></span></button>
                                </template>
                            </div>
                        </div>

                        <!-- Tap / Long Press -->
                        <div x-show="a.action_type === 'tap' || a.action_type === 'long_press'" class="space-y-2 mb-3">
                            <!-- Template Image Picker -->
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">📸 Template Image <span class="text-slate-600">(auto-detect X,Y)</span></label>
                                <div class="flex items-center gap-2">
                                    <input x-model="a.template_path" type="text" readonly class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand font-mono" placeholder="Opsional: pilih gambar untuk auto-detect koordinat...">
                                    <button type="button" @click="openTemplatePicker(a)" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg px-4 py-2 transition-colors shrink-0 cursor-pointer">📁 Browse</button>
                                </div>
                                <p class="text-xs text-slate-600 mt-1">Kosongkan untuk menggunakan koordinat manual di bawah</p>
                                <!-- Template preview -->
                                <div x-show="a.template_path" class="mt-2 bg-slate-800 border border-dashed border-slate-600 rounded-lg h-20 flex items-center justify-center text-slate-500 text-sm overflow-hidden">
                                    <img :src="'/static/' + a.template_path" class="max-h-full max-w-full object-contain" alt="Template preview">
                                </div>
                            </div>
                            <!-- Manual Coords & Template Match Config -->
                            <div x-show="a.template_path">
                                <div class="grid grid-cols-2 gap-3 bg-slate-800/50 rounded-lg p-3 border border-slate-700/30">
                                    <div><label class="block text-xs font-medium text-slate-500 mb-1">Match Threshold (0-1)</label><input x-model.number="a.match_threshold" type="number" min="0" max="1" step="0.05" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                    <div><label class="block text-xs font-medium text-slate-500 mb-1">Retry Count</label><input x-model.number="a.retry_count" type="number" min="1" max="99" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                    <div class="col-span-2"><label class="block text-xs font-medium text-slate-500 mb-1">Retry Delay (ms)</label><input x-model.number="a.retry_delay_ms" type="number" min="0" step="100" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                </div>
                            </div>
                            <!-- Manual Coordinates -->
                            <div x-show="!a.template_path && !a.use_match_result">
                                <div class="grid grid-cols-2 gap-2"><div><label class="text-xs text-slate-500">X <span x-show="a.use_match_result" class="text-slate-600">(auto)</span></label><input x-model.number="a.x" :disabled="a.use_match_result" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand disabled:opacity-40"></div><div><label class="text-xs text-slate-500">Y</label><input x-model.number="a.y" :disabled="a.use_match_result" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand disabled:opacity-40"></div></div>
                            </div>
                            <label class="flex items-center gap-2 text-xs text-slate-400 cursor-pointer select-none">
                                <input type="checkbox" x-model="a.use_match_result" class="rounded bg-slate-800 border-surface-border text-brand focus:ring-brand"> Use result from previous Match action
                            </label>
                            <div x-show="a.action_type === 'long_press'"><label class="text-xs text-slate-500">Duration (ms)</label><input x-model.number="a.duration_ms" type="number" min="100" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>
                        </div>

                        <!-- Swipe -->
                        <div x-show="a.action_type === 'swipe'" class="space-y-2 mb-3">
                            <!-- Template Image for Start Point -->
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">📸 Template Image (Start) <span class="text-slate-600">(auto-detect from X,Y)</span></label>
                                <div class="flex items-center gap-2">
                                    <input x-model="a.template_path" type="text" readonly class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand font-mono" placeholder="Opsional: pilih gambar untuk auto-detect start point...">
                                    <button type="button" @click="openTemplatePicker(a)" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg px-4 py-2 transition-colors shrink-0 cursor-pointer">📁 Browse</button>
                                </div>
                                <div x-show="a.template_path" class="mt-2 bg-slate-800 border border-dashed border-slate-600 rounded-lg h-20 flex items-center justify-center text-slate-500 text-sm overflow-hidden">
                                    <img :src="'/static/' + a.template_path" class="max-h-full max-w-full object-contain" alt="Start template preview">
                                </div>
                            </div>
                            <!-- Template Image for End Point -->
                            <div x-show="a.template_path">
                                <label class="block text-xs font-medium text-slate-500 mb-1">📸 Template Image (End) <span class="text-slate-600">(auto-detect to X,Y)</span></label>
                                <div class="flex items-center gap-2">
                                    <input x-model="a.template_path2" type="text" readonly class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand font-mono" placeholder="Opsional: pilih gambar untuk auto-detect end point...">
                                    <button type="button" @click="openTemplatePicker2(a)" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg px-4 py-2 transition-colors shrink-0 cursor-pointer">📁 Browse</button>
                                </div>
                                <div x-show="a.template_path2" class="mt-2 bg-slate-800 border border-dashed border-slate-600 rounded-lg h-20 flex items-center justify-center text-slate-500 text-sm overflow-hidden">
                                    <img :src="'/static/' + a.template_path2" class="max-h-full max-w-full object-contain" alt="End template preview">
                                </div>
                            </div>
                            <!-- Template Match Config -->
                            <div x-show="a.template_path">
                                <div class="grid grid-cols-2 gap-3 bg-slate-800/50 rounded-lg p-3 border border-slate-700/30">
                                    <div><label class="block text-xs font-medium text-slate-500 mb-1">Match Threshold (0-1)</label><input x-model.number="a.match_threshold" type="number" min="0" max="1" step="0.05" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                    <div><label class="block text-xs font-medium text-slate-500 mb-1">Retry Count</label><input x-model.number="a.retry_count" type="number" min="1" max="99" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                    <div class="col-span-2"><label class="block text-xs font-medium text-slate-500 mb-1">Retry Delay (ms)</label><input x-model.number="a.retry_delay_ms" type="number" min="0" step="100" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                </div>
                            </div>
                            <!-- Manual Coordinates -->
                            <div x-show="!a.template_path">
                                <div class="grid grid-cols-2 gap-2"><div><label class="text-xs text-slate-500">From X</label><input x-model.number="a.x" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div><div><label class="text-xs text-slate-500">From Y</label><input x-model.number="a.y" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div><div><label class="text-xs text-slate-500">To X</label><input x-model.number="a.x2" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div><div><label class="text-xs text-slate-500">To Y</label><input x-model.number="a.y2" type="number" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div></div>
                            </div>
                            <div><label class="text-xs text-slate-500">Duration (ms)</label><input x-model.number="a.duration_ms" type="number" min="50" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>
                        </div>

                        <!-- Screenshot Match -->
                        <div x-show="a.action_type === 'screenshot_match'" class="space-y-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Template Image</label>
                                <div class="flex items-center gap-2">
                                    <input x-model="a.template_path" type="text" readonly class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand font-mono" placeholder="Pilih gambar template...">
                                    <button type="button" @click="openTemplatePicker(a)" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg px-4 py-2 transition-colors shrink-0 cursor-pointer">📁 Browse</button>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-xs font-medium text-slate-500 mb-1">Threshold (0-1)</label><input x-model.number="a.match_threshold" type="number" min="0" max="1" step="0.05" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"></div>
                                <div><label class="block text-xs font-medium text-slate-500 mb-1">Retry Count</label><input x-model.number="a.retry_count" type="number" min="1" max="99" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"><p class="text-xs text-slate-600 mt-0.5">Berapa kali coba ulang</p></div>
                            </div>
                            <div><label class="block text-xs font-medium text-slate-500 mb-1">Retry Delay (ms)</label><input x-model.number="a.retry_delay_ms" type="number" min="0" step="100" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand"><p class="text-xs text-slate-600 mt-0.5">Delay antar percobaan ulang</p></div>

                            <!-- Jump logic -->
                            <div class="bg-slate-800/50 rounded-xl p-3 border border-slate-700/30 space-y-2">
                                <p class="text-xs text-warning font-medium mb-2">🔀 Conditional Jump (by action name)</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-xs font-medium text-success mb-1">✅ If Success → jump to</label>
                                        <div class="flex items-center gap-2">
                                            <input x-model="a.jump_on_success" type="text" :list="'names_'+a._id" class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 font-mono placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-success" placeholder="action_name (empty=next)">
                                            <datalist :id="'names_'+a._id">
                                                <template x-for="act in actions.filter(x=>x._id!==a._id)" :key="act._id">
                                                    <option :value="act.name" x-text="act.name + ' — ' + act.action_type"></option>
                                                </template>
                                            </datalist>
                                        </div>
                                        <p class="text-xs text-slate-600 mt-0.5">Kosongkan = lanjut action berikutnya</p>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-danger mb-1">❌ If Fail → jump to</label>
                                        <div class="flex items-center gap-2">
                                            <input x-model="a.jump_on_fail" type="text" :list="'names_'+a._id" class="flex-1 bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 font-mono placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-danger" placeholder="action_name (empty=stop)">
                                        </div>
                                        <p class="text-xs text-slate-600 mt-0.5">Kosongkan = stop execution dengan error</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-dashed border-slate-600 rounded-lg h-24 flex items-center justify-center text-slate-500 text-sm overflow-hidden">
                                <template x-if="a.template_path">
                                    <img :src="'/static/' + a.template_path" class="max-h-full max-w-full object-contain" alt="Template preview">
                                </template>
                                <span x-show="!a.template_path">🖼️ Template preview</span>
                            </div>
                        </div>

                        <!-- Wait -->
                        <div x-show="a.action_type === 'wait'" class="mb-3"><label class="text-xs text-slate-500">Duration (ms)</label><input x-model.number="a.wait_ms" type="number" min="0" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>

                        <!-- Push Key -->
                        <div x-show="a.action_type === 'push_key'" class="space-y-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Android Key Code</label>
                                <select x-model="a.key_code" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand">
                                    <optgroup label="Navigation">
                                        <option value="HOME">HOME</option>
                                        <option value="BACK">BACK</option>
                                        <option value="RECENTS">RECENTS / APP_SWITCH</option>
                                        <option value="MENU">MENU</option>
                                    </optgroup>
                                    <optgroup label="Volume">
                                        <option value="VOLUME_UP">VOLUME_UP</option>
                                        <option value="VOLUME_DOWN">VOLUME_DOWN</option>
                                        <option value="VOLUME_MUTE">VOLUME_MUTE</option>
                                    </optgroup>
                                    <optgroup label="Media">
                                        <option value="MEDIA_PLAY">MEDIA_PLAY</option>
                                        <option value="MEDIA_PAUSE">MEDIA_PAUSE</option>
                                        <option value="MEDIA_NEXT">MEDIA_NEXT</option>
                                        <option value="MEDIA_PREVIOUS">MEDIA_PREVIOUS</option>
                                    </optgroup>
                                    <optgroup label="Power & Others">
                                        <option value="POWER">POWER</option>
                                        <option value="CAMERA">CAMERA</option>
                                        <option value="SEARCH">SEARCH</option>
                                        <option value="ENTER">ENTER</option>
                                        <option value="DEL">DELETE / BACKSPACE</option>
                                        <option value="TAB">TAB</option>
                                        <option value="ESCAPE">ESCAPE</option>
                                    </optgroup>
                                    <optgroup label="DPad">
                                        <option value="DPAD_UP">DPAD_UP</option>
                                        <option value="DPAD_DOWN">DPAD_DOWN</option>
                                        <option value="DPAD_LEFT">DPAD_LEFT</option>
                                        <option value="DPAD_RIGHT">DPAD_RIGHT</option>
                                        <option value="DPAD_CENTER">DPAD_CENTER</option>
                                    </optgroup>
                                    <optgroup label="Custom">
                                        <option value="CUSTOM">CUSTOM (specify below)</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div x-show="a.key_code === 'CUSTOM'">
                                <label class="block text-xs font-medium text-slate-500 mb-1">Custom Key Code (integer)</label>
                                <input x-model="a._custom_key" type="text" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2 text-sm text-slate-100 font-mono placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand" placeholder="e.g. 66 = ENTER">
                            </div>
                        </div>

                        <!-- Combo -->
                        <div x-show="a.action_type === 'combo'" class="space-y-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Combo Action</label>
                                <select x-model="a.combo_action" class="w-full bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand">
                                    <option value="select_all">Select All (Ctrl+A)</option>
                                    <option value="copy">Copy (Ctrl+C)</option>
                                    <option value="cut">Cut (Ctrl+X)</option>
                                    <option value="paste">Paste (Ctrl+V)</option>
                                    <option value="undo">Undo (Ctrl+Z)</option>
                                    <option value="redo">Redo (Ctrl+Shift+Z)</option>
                                    <option value="find">Find (Ctrl+F)</option>
                                    <option value="save">Save (Ctrl+S)</option>
                                    <option value="screenshot">Screenshot (Power+VolDown)</option>
                                    <option value="switch_app">Switch App (Alt+Tab)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Fetch API -->
                        <div x-show="a.action_type === 'fetch_api'" class="space-y-2 mb-3">
                            <div class="grid grid-cols-4 gap-2"><div class="col-span-1"><label class="text-xs text-slate-500">Method</label><select x-model="a.api_method" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select></div><div class="col-span-3"><label class="text-xs text-slate-500">URL</label><input x-model="a.api_url" type="text" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono" placeholder="https://api.example.com/data"></div></div>
                            <div x-show="a.api_method === 'POST' || a.api_method === 'PUT'"><label class="text-xs text-slate-500">Headers (JSON)</label><textarea x-model="a.api_headers" rows="2" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono resize-none" placeholder='{"Content-Type":"application/json"}'></textarea></div>
                            <div x-show="a.api_method === 'POST' || a.api_method === 'PUT'"><label class="text-xs text-slate-500">Body (JSON)</label><textarea x-model="a.api_body" rows="3" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono resize-none" placeholder='{"key":"value"}'></textarea></div>
                            <div><label class="text-xs text-slate-500">Save to Variable</label><input x-model="a.api_save_to_var" type="text" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono" placeholder="variable_name (optional)"><p class="text-xs text-slate-600 mt-0.5">Hasil response akan disimpan ke variable ini</p></div>
                        </div>

                        <!-- Variable -->
                        <div x-show="a.action_type === 'variable'" class="space-y-2 mb-3">
                            <div><label class="text-xs text-slate-500">Variable Name</label><input x-model="a.var_name" type="text" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono"></div>
                            <div class="grid grid-cols-3 gap-2">
                                <button @click="a.var_operation='set'" :class="a.var_operation==='set'?'bg-brand text-white border-brand':'bg-slate-800 border-surface-border text-slate-400'" class="border rounded-lg p-1.5 text-xs text-center transition-all">📥 Set</button>
                                <button @click="a.var_operation='update'" :class="a.var_operation==='update'?'bg-brand text-white border-brand':'bg-slate-800 border-surface-border text-slate-400'" class="border rounded-lg p-1.5 text-xs text-center transition-all">🔄 Update</button>
                                <button @click="a.var_operation='get'" :class="a.var_operation==='get'?'bg-brand text-white border-brand':'bg-slate-800 border-surface-border text-slate-400'" class="border rounded-lg p-1.5 text-xs text-center transition-all">📤 Get</button>
                            </div>
                            <div x-show="a.var_operation !== 'get'"><label class="text-xs text-slate-500">Value</label><input x-model="a.var_value" type="text" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono"></div>
                        </div>

                        <!-- Type Text -->
                        <div x-show="a.action_type === 'type_text'" class="space-y-2 mb-3">
                            <div><label class="text-xs text-slate-500">Text</label><textarea x-model="a.text_content" rows="2" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100 font-mono resize-none"></textarea></div>
                            <div><label class="text-xs text-slate-500">Speed (ms/char)</label><input x-model.number="a.text_speed_ms" type="number" min="10" max="1000" step="10" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>
                        </div>

                        <!-- Common -->
                        <div class="grid grid-cols-2 gap-2 pt-3 border-t border-slate-700/50">
                            <div><label class="text-xs text-slate-500">Wait Before (ms)</label><input x-model.number="a.wait_before_ms" type="number" min="0" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>
                            <div><label class="text-xs text-slate-500">Wait After (ms)</label><input x-model.number="a.wait_after_ms" type="number" min="0" class="w-full bg-slate-800 border border-surface-border rounded px-2 py-1.5 text-sm text-slate-100"></div>
                        </div>

                        <div class="flex justify-end mt-3 pt-3 border-t border-slate-700/50">
                            <button @click="deleteAction(idx)" class="text-xs text-slate-500 hover:text-danger inline-flex items-center gap-1">🗑️ Remove</button>
                        </div>
                    </div>
                </div>
            </template>

            <div x-show="actions.length === 0" class="bg-surface-card border border-surface-border border-dashed rounded-xl p-12 text-center">
                <span class="text-5xl mb-4 block">⚡</span>
                <p class="text-slate-400 mb-2">Belum ada action</p>
                <button @click="addAction()" class="inline-flex items-center gap-2 bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-5 py-3 transition-all text-sm">＋ Add First Action</button>
            </div>
        </div>

        <div x-show="actions.length > 0" class="flex justify-end pt-2">
            <button @click="save()" class="bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-5 py-3 transition-all shadow-lg shadow-brand/25 text-sm">💾 <span x-text="isNew ? 'Create Script' : 'Save All Changes'"></span></button>
        </div>

        <!-- Template Picker Modal (inside x-data) -->
        <div x-show="showTemplateModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" x-transition.opacity @click.self="showTemplateModal = false">
            <div class="bg-slate-800 border border-surface-border rounded-2xl w-full max-w-lg max-h-[80vh] overflow-hidden shadow-2xl" @click.stop="">
                <div class="flex items-center justify-between px-5 py-4 border-b border-surface-border">
                    <h3 class="font-semibold text-slate-100">📁 Pilih Template Image</h3>
                    <button @click="showTemplateModal = false" class="text-slate-400 hover:text-slate-200 text-lg cursor-pointer">✕</button>
                </div>
                <div class="px-5 py-3 max-h-[50vh] overflow-y-auto space-y-2">
                    <p class="text-xs text-slate-500 font-medium mb-2">📂 Gambar di server</p>
                    <template x-if="templateList.length === 0">
                        <p class="text-sm text-slate-500 text-center py-8">Belum ada gambar. Upload dari bawah ↓</p>
                    </template>
                    <template x-for="tpl in templateList" :key="tpl.path">
                        <div @click="selectTemplate(tpl)" :class="tplPickerAction && tplPickerAction.template_path === tpl.path ? 'border-brand bg-brand/10' : 'border-transparent bg-slate-900/50 hover:border-slate-600'" class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer transition-all">
                            <img :src="tpl.url" class="w-12 h-12 rounded-lg object-cover bg-slate-700 shrink-0" alt="">
                            <div class="flex-1 min-w-0"><p class="text-sm text-slate-200 truncate" x-text="tpl.filename"></p><p class="text-xs text-slate-500" x-text="(tpl.size/1024).toFixed(1)+' KB'"></p></div>
                            <span x-show="tplPickerAction && tplPickerAction.template_path === tpl.path" class="text-brand">✓</span>
                        </div>
                    </template>
                </div>
                <div class="px-5 py-4 border-t border-surface-border bg-slate-900/50">
                    <p class="text-xs text-slate-500 font-medium mb-2">📤 Upload gambar baru</p>
                    <div class="flex items-center gap-2">
                        <input type="file" accept="image/*" class="hidden" @change="uploadTemplateFromModal($event)">
                        <button @click="$el.previousElementSibling.click()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm rounded-lg px-4 py-2.5 transition-colors cursor-pointer">📁 Pilih file...</button>
                    </div>
                    <div x-show="uploadingTpl" class="mt-2 text-xs text-slate-400">⏳ Uploading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let sortableInstance = null;
    function scriptEditor() {
        return {
            isNew: true,
            scriptId: null,
            script: { name: '', description: '', repeat_count: 1, delay_between_ms: 1000 },
            actions: [],
            _counter: 100,
            actionTypes: ['tap','swipe','long_press','screenshot_match','wait','push_key','combo','fetch_api','variable','type_text'],
            typeIcon(t) { return {'tap':'👆','swipe':'↔️','long_press':'⏳','screenshot_match':'🖼️','wait':'⏱️','push_key':'⌨️','combo':'🔀','fetch_api':'🌐','variable':'📦','type_text':'📝'}[t]||'❓'; },

            // Template picker modal state
            showTemplateModal: false,
            tplPickerAction: null,
            tplPickerField: 'template_path',  // 'template_path' or 'template_path2'
            templateList: [],
            uploadingTpl: false,

            async openTemplatePicker(action) {
                this.tplPickerAction = action;
                this.tplPickerField = 'template_path';
                this.showTemplateModal = true;
                await this.loadTemplateList();
            },
            async openTemplatePicker2(action) {
                this.tplPickerAction = action;
                this.tplPickerField = 'template_path2';
                this.showTemplateModal = true;
                await this.loadTemplateList();
            },
            async loadTemplateList() {
                try {
                    const r = await fetch('/api/templates');
                    if (r.ok) {
                        const data = await r.json();
                        this.templateList = data.templates || [];
                    }
                } catch(e) {
                    this.templateList = [];
                }
            },
            selectTemplate(tpl) {
                if (this.tplPickerAction) {
                    this.tplPickerAction[this.tplPickerField] = tpl.path;
                }
                this.showTemplateModal = false;
                this.tplPickerAction = null;
                this.tplPickerField = 'template_path';
            },
            async uploadTemplateFromModal(event) {
                const file = event.target.files[0];
                if (!file) return;
                this.uploadingTpl = true;
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const r = await fetch('/api/upload/template', { method: 'POST', body: formData });
                    if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'Upload failed'); }
                    const data = await r.json();
                    if (this.tplPickerAction) {
                        this.tplPickerAction[this.tplPickerField] = data.path;
                    }
                    this.showTemplateModal = false;
                    this.tplPickerAction = null;
                    // Reload list for next open
                    this.templateList = [];
                } catch(e) {
                    alert('⚠️ Upload gagal: ' + e.message);
                } finally {
                    this.uploadingTpl = false;
                }
            },
            async init() {
                // Check for script_id from template variable first, then fallback to ?id= query param
                const templateId = document.getElementById('script-editor-root')?.dataset?.scriptId;
                if (templateId) {
                    this.isNew = false; this.scriptId = parseInt(templateId);
                } else {
                    const p = new URLSearchParams(window.location.search);
                    if (p.get('id')) {
                        this.isNew = false; this.scriptId = parseInt(p.get('id'));
                    }
                }
                if (!this.isNew && this.scriptId) {
                    try {
                        const r = await fetch(`/api/scripts/${this.scriptId}`);
                        if (!r.ok) throw new Error('Script not found');
                        const s = await r.json();
                        this.script = { name: s.name, description: s.description||'', repeat_count: s.repeat_count, delay_between_ms: s.delay_between_ms };
                        this.actions = (s.actions||[]).map(a => {
                            // If key_code is a numeric string or unknown, treat as CUSTOM
                            const KNOWN_KEYS = ['HOME','BACK','RECENTS','MENU','VOLUME_UP','VOLUME_DOWN','VOLUME_MUTE','MEDIA_PLAY','MEDIA_PAUSE','MEDIA_NEXT','MEDIA_PREVIOUS','POWER','CAMERA','SEARCH','ENTER','DEL','TAB','ESCAPE','DPAD_UP','DPAD_DOWN','DPAD_LEFT','DPAD_RIGHT','DPAD_CENTER'];
                            const isCustomKey = a.action_type === 'push_key' && !KNOWN_KEYS.includes(a.key_code) && a.key_code !== 'CUSTOM';
                            return {
                                ...a,
                                _id: ++this._counter,
                                _expanded: false,
                                _custom_key: isCustomKey ? a.key_code : (a._custom_key || ''),
                                key_code: isCustomKey ? 'CUSTOM' : (a.key_code || 'HOME'),
                            };
                        });
                    } catch(e) {
                        alert('⚠️ Gagal memuat script: ' + e.message);
                        window.location.href = '/dashboard';
                        return;
                    }
                }
                this.$nextTick(() => this.initSortable());
            },
            addAction() {
                this.actions.push({ _id: ++this._counter, _expanded: true, name: 'action_'+this._counter, action_type: 'tap', x:null,y:null,x2:null,y2:null,duration_ms:300,template_path:'',template_path2:'',match_threshold:0.8,retry_count:1,retry_delay_ms:1000,jump_on_success:'',jump_on_fail:'',key_code:'HOME',combo_action:'select_all',api_url:'',api_method:'GET',api_headers:'',api_body:'',api_save_to_var:'',var_name:'',var_operation:'set',var_value:'',text_content:'',text_speed_ms:50,wait_ms:1000,wait_before_ms:500,wait_after_ms:500,use_match_result:false });
            },
            deleteAction(idx) { this.actions.splice(idx, 1); },
            async save() {
                if (!this.script.name.trim()) return alert('Name required!');
                const body = this.script;
                let scriptId = this.scriptId;
                if (this.isNew) {
                    const r = await fetch('/api/scripts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
                    if (!r.ok) return alert('Failed to create script');
                    const s = await r.json();
                    scriptId = s.id; this.isNew = false; this.scriptId = scriptId;
                    window.history.replaceState({}, '', '/scripts/'+scriptId+'/edit');
                } else {
                    await fetch(`/api/scripts/${scriptId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
                }
                // Save all actions
                const existing = this.isNew ? [] : await (await fetch(`/api/scripts/${scriptId}/actions`)).json();
                for (const a of existing) {
                    if (!this.actions.find(x => x.id === a.id)) {
                        await fetch(`/api/scripts/${scriptId}/actions/${a.id}`, { method:'DELETE' });
                    }
                }
                for (let i = 0; i < this.actions.length; i++) {
                    const a = this.actions[i];
                    const payload = {
                        name: a.name, action_type: a.action_type,
                        x: a.x, y: a.y, x2: a.x2, y2: a.y2, duration_ms: a.duration_ms,
                        template_path: a.template_path, template_path2: a.template_path2, match_threshold: a.match_threshold,
                        retry_count: a.retry_count, retry_delay_ms: a.retry_delay_ms,
                        jump_on_success: a.jump_on_success, jump_on_fail: a.jump_on_fail,
                        key_code: a.key_code === 'CUSTOM' ? (a._custom_key != null ? String(a._custom_key) : 'CUSTOM') : a.key_code, combo_action: a.combo_action,
                        api_url: a.api_url, api_method: a.api_method, api_headers: '{}',
                        api_body: '', api_save_to_var: a.api_save_to_var,
                        var_name: a.var_name, var_operation: a.var_operation,
                        var_value: a.var_value, text_content: a.text_content,
                        text_speed_ms: a.text_speed_ms,
                        use_match_result: !!a.use_match_result,
                        wait_ms: a.wait_ms, wait_before_ms: a.wait_before_ms,
                        wait_after_ms: a.wait_after_ms,
                    };
                    if (a.id) {
                        await fetch(`/api/scripts/${scriptId}/actions/${a.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    } else {
                        const r = await fetch(`/api/scripts/${scriptId}/actions`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                        if (r.ok) { const na = await r.json(); a.id = na.id; }
                    }
                }
                // Sync action order after all saves
                const orderedIds = this.actions.map(a => a.id).filter(id => id != null);
                if (orderedIds.length > 0) {
                    await fetch(`/api/scripts/${scriptId}/actions/reorder/apply`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ order: orderedIds })
                    });
                }
                alert('✅ Saved!');
            },
            initSortable() {
                const el = document.getElementById('actions-list');
                if (!el || sortableInstance) return;
                sortableInstance = new Sortable(el, {
                    handle: '.drag-handle', animation: 200,
                    ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                    onEnd: (evt) => {
                        const item = this.actions.splice(evt.oldIndex, 1)[0];
                        this.actions.splice(evt.newIndex, 0, item);
                    }
                });
            }
        };
    }
</script>
{% endblock %}
