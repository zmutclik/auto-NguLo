{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% set nav_active = 'scripts' %}
{% block content %}

<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <div>
        <h1 class="text-2xl font-bold">📋 Automation Scripts</h1>
        <p class="text-slate-400 text-sm mt-1"><span x-text="scripts.length"></span> script tersimpan</p>
    </div>
    <a href="/scripts/new" class="inline-flex items-center gap-2 bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-5 py-3 transition-all shadow-lg shadow-brand/25 hover:shadow-brand/40">
        <span>＋</span> New Script
    </a>
</div>

<div class="bg-surface-card border border-surface-border rounded-xl p-4 mb-6">
    <div class="flex gap-3">
        <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
            <input x-model="searchQuery" type="text"
                   class="w-full bg-slate-800 border border-surface-border rounded-lg pl-10 pr-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand transition-all text-sm"
                   placeholder="Cari script...">
        </div>
        <select x-model="sortBy" class="bg-slate-800 border border-surface-border rounded-lg px-3 py-2.5 text-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
            <option value="newest">Terbaru</option>
            <option value="oldest">Terlama</option>
            <option value="name">Nama A-Z</option>
            <option value="actions">Jumlah Actions</option>
        </select>
    </div>
</div>

<div class="space-y-4" id="scripts-list" x-data="dashboard()" x-init="init()">
    <template x-for="script in filteredScripts" :key="script.id">
        <div class="bg-surface-card border border-surface-border rounded-xl overflow-hidden hover:border-slate-600 transition-all shadow-md">
            <div class="p-5 cursor-pointer" @click="script._expanded = !script._expanded">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-lg" x-text="script.icon || '📱'"></span>
                            <h3 class="font-semibold text-slate-100 truncate" x-text="script.name"></h3>
                            <span class="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full font-mono">#<span x-text="script.id"></span></span>
                        </div>
                        <p class="text-sm text-slate-400 truncate" x-text="script.description || 'No description'"></p>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="text-xs bg-brand/10 text-brand px-2 py-1 rounded-full font-medium whitespace-nowrap">
                            ⚡ <span x-text="script.action_count || 0"></span> actions
                        </span>
                        <svg :class="script._expanded ? 'rotate-180' : ''" class="w-4 h-4 text-slate-500 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>
                <div class="flex items-center gap-3 mt-3 text-xs text-slate-500">
                    <span>🔄 Repeat: <span x-text="script.repeat_count" class="text-slate-400"></span>x</span>
                    <span>•</span>
                    <span>⏱️ Updated: <span x-text="script.updated_at?.split('T')[0] || '-'" class="text-slate-400"></span></span>
                </div>
            </div>

            <div x-show="script._expanded" x-transition class="border-t border-surface-border bg-slate-900/50 px-5 py-4">
                <p class="text-xs text-slate-500 uppercase tracking-wider mb-3 font-medium">Action Flow</p>
                <div class="space-y-2" x-data="{ actions: [] }" x-init="fetch(`/api/scripts/${script.id}`).then(r=>r.json()).then(d=>{actions=d.actions||[]; script._actions=actions})">
                    <template x-for="(a, i) in script._actions || []" :key="a.id">
                        <div class="flex items-center gap-3 text-sm bg-slate-800/50 rounded-lg px-3 py-2 border border-slate-700/30">
                            <span class="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-xs text-slate-400 font-mono" x-text="i+1"></span>
                            <span x-text="a.action_type === 'screenshot_match' ? '🖼️' : a.action_type === 'tap' ? '👆' : a.action_type === 'swipe' ? '↔️' : a.action_type === 'long_press' ? '⏳' : a.action_type === 'wait' ? '⏱️' : a.action_type === 'push_key' ? '⌨️' : a.action_type === 'combo' ? '🔀' : a.action_type === 'fetch_api' ? '🌐' : a.action_type === 'variable' ? '📦' : a.action_type === 'type_text' ? '📝' : '❓'" class="text-base"></span>
                            <span class="text-slate-300" x-text="a.action_type + ' [' + (a.name || '?') + ']'"></span>
                        </div>
                    </template>
                    <div x-show="!script._actions || script._actions.length === 0" class="text-xs text-slate-600">Loading...</div>
                </div>
            </div>

            <div class="border-t border-surface-border px-5 py-3 flex flex-wrap gap-2 bg-slate-900/30">
                <a :href="'/execute/' + script.id" class="inline-flex items-center gap-1.5 bg-success hover:bg-green-600 text-white text-xs font-semibold rounded-lg px-3 py-2 transition-colors shadow-sm shadow-success/20">▶️ Run</a>
                <a :href="'/scripts/' + script.id + '/edit'" class="inline-flex items-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-semibold rounded-lg px-3 py-2 transition-colors">✏️ Edit</a>
                <button @click="copyScript(script)" class="inline-flex items-center gap-1.5 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-semibold rounded-lg px-3 py-2 transition-colors">📋 Copy</button>
                <button @click="confirmDelete(script)" class="inline-flex items-center gap-1.5 hover:bg-red-500/10 text-slate-400 hover:text-danger text-xs font-semibold rounded-lg px-3 py-2 transition-colors ml-auto">🗑️ Delete</button>
            </div>
        </div>
    </template>

    <div x-show="filteredScripts.length === 0" class="text-center py-16">
        <div class="text-6xl mb-4">📭</div>
        <p class="text-slate-400 text-lg mb-2" x-text="searchQuery ? 'Tidak ada script yang cocok' : 'Belum ada script'"></p>
        <a href="/scripts/new" x-show="!searchQuery" class="inline-flex items-center gap-2 bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-5 py-3 transition-all text-sm">＋ Buat Script Pertama</a>
    </div>

    <!-- Delete Modal -->
    <div x-show="deleteTarget !== null" x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" @click.self="deleteTarget = null">
        <div class="bg-surface-card border border-surface-border rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <div class="text-center mb-4">
                <span class="text-5xl">⚠️</span>
                <h3 class="text-lg font-semibold mt-3">Hapus Script?</h3>
                <p class="text-slate-400 text-sm mt-1">Script "<span x-text="deleteTarget?.name" class="text-slate-200 font-medium"></span>" akan dihapus permanen.</p>
            </div>
            <div class="flex gap-3">
                <button @click="deleteTarget = null" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium rounded-lg py-2.5 text-sm">Batal</button>
                <button @click="doDelete()" class="flex-1 bg-danger hover:bg-red-600 text-white font-medium rounded-lg py-2.5 text-sm">🗑️ Hapus</button>
            </div>
        </div>
    </div>
</div>

<script>
    function dashboard() {
        return {
            searchQuery: '',
            sortBy: 'newest',
            deleteTarget: null,
            scripts: [],
            async init() {
                const r = await fetch('/api/scripts');
                this.scripts = await r.json();
            },
            get filteredScripts() {
                let r = this.scripts;
                if (this.searchQuery) {
                    const q = this.searchQuery.toLowerCase();
                    r = r.filter(s => s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q));
                }
                if (this.sortBy === 'name') r = [...r].sort((a,b) => a.name.localeCompare(b.name));
                if (this.sortBy === 'actions') r = [...r].sort((a,b) => (b.action_count||0) - (a.action_count||0));
                if (this.sortBy === 'oldest') r = [...r].reverse();
                return r;
            },
            async copyScript(script) {
                const r = await fetch(`/api/scripts/${script.id}`);
                const full = await r.json();
                const cr = await fetch('/api/scripts', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: full.name + ' (copy)', description: full.description, repeat_count: full.repeat_count, delay_between_ms: full.delay_between_ms})
                });
                if (cr.ok) {
                    const ns = await cr.json();
                    for (const a of (full.actions||[])) {
                        await fetch(`/api/scripts/${ns.id}/actions`, {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({
                                name: a.name, action_type: a.action_type,
                                x: a.x, y: a.y, x2: a.x2, y2: a.y2, duration_ms: a.duration_ms,
                                template_path: a.template_path, match_threshold: a.match_threshold,
                                retry_count: a.retry_count, retry_delay_ms: a.retry_delay_ms,
                                jump_on_success: a.jump_on_success, jump_on_fail: a.jump_on_fail,
                                key_code: a.key_code, combo_action: a.combo_action,
                                api_url: a.api_url, api_method: a.api_method,
                                api_headers: a.api_headers, api_body: a.api_body,
                                api_save_to_var: a.api_save_to_var,
                                var_name: a.var_name, var_operation: a.var_operation,
                                var_value: a.var_value, text_content: a.text_content,
                                text_speed_ms: a.text_speed_ms,
                                use_match_result: !!a.use_match_result,
                                wait_ms: a.wait_ms, wait_before_ms: a.wait_before_ms,
                                wait_after_ms: a.wait_after_ms,
                            })
                        });
                    }
                    await this.init();
                }
            },
            confirmDelete(s) { this.deleteTarget = s; },
            async doDelete() {
                if (!this.deleteTarget) return;
                await fetch(`/api/scripts/${this.deleteTarget.id}`, { method: 'DELETE' });
                this.deleteTarget = null;
                await this.init();
            }
        }
    }
</script>
{% endblock %}
