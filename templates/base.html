<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-NguLo — {% block title %}App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: { DEFAULT: '#0F172A', card: '#1E293B', border: '#334155', hover: '#263348' },
                        brand: { DEFAULT: '#6366F1', hover: '#5558E6' },
                        success: '#10B981', danger: '#EF4444', warning: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0F172A; color: #F1F5F9; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen">

    {% if nav_active != 'nologin' %}
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-surface-border sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-brand to-purple-600 rounded-xl flex items-center justify-center shadow-sm shadow-brand/20">
                    <span class="text-lg">🤖</span>
                </div>
                <span class="font-bold text-lg bg-gradient-to-r from-brand to-purple-400 bg-clip-text text-transparent">Auto-NguLo</span>
            </div>
            <div class="flex items-center gap-1">
                <a href="/dashboard" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'scripts' %}bg-brand/10 text-brand{% endif %}">📋 Scripts</a>
                <a href="/gallery" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'gallery' %}bg-brand/10 text-brand{% endif %}">🖼️ Gallery</a>
                <a href="/history" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'history' %}bg-brand/10 text-brand{% endif %}">📜 History</a>
                <a href="/variables" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'variables' %}bg-brand/10 text-brand{% endif %}">🗂️ Variables</a>
                <a href="/keyboard" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'keyboard' %}bg-brand/10 text-brand{% endif %}">⌨️ Keyboard</a>
                <a href="/settings" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors {% if nav_active == 'settings' %}bg-brand/10 text-brand{% endif %}">⚙️ Settings</a>
                <div class="w-px h-6 bg-surface-border mx-2 hidden sm:block"></div>
                <a href="/logout" class="px-4 py-2 text-slate-400 hover:text-danger hover:bg-red-500/10 rounded-lg text-sm font-medium transition-colors">🔒 Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
