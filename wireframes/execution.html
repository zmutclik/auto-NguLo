<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-NguLo — Execution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: { DEFAULT: '#0F172A', card: '#1E293B', border: '#334155', hover: '#263348' },
                        brand: { DEFAULT: '#6366F1', hover: '#5558E6' },
                        success: '#10B981', danger: '#EF4444', warning: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0F172A; color: #F1F5F9; }
        .font-mono-custom { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-dot { animation: pulse-dot 1s ease-in-out infinite; }
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes logEntry { from { opacity: 0; transform: translateX(-10px); background: rgba(99,102,241,0.1); } to { opacity: 1; transform: translateX(0); background: transparent; } }
        .log-entry { animation: logEntry 0.4s ease-out; }
        .progress-bar { transition: width 0.3s ease; background: linear-gradient(90deg, #6366F1, #8B5CF6); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen" x-data="execution()" x-init="startSimulation()">

    <!-- Navigation -->
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-surface-border sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-brand to-purple-600 rounded-xl flex items-center justify-center shadow-sm shadow-brand/20">
                    <span class="text-lg">🤖</span>
                </div>
                <span class="font-bold text-lg bg-gradient-to-r from-brand to-purple-400 bg-clip-text text-transparent">Auto-NguLo</span>
            </div>
            <div class="flex items-center gap-1">
                <a href="dashboard.html" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors">📋 Scripts</a>
                <a href="history.html" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors">📜 History</a>
                <a href="settings.html" class="px-4 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm font-medium transition-colors">⚙️ Settings</a>
                <a href="login.html" class="px-4 py-2 text-slate-400 hover:text-danger hover:bg-red-500/10 rounded-lg text-sm font-medium transition-colors">🔒 Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">

        <!-- Back -->
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-200 transition-colors text-sm mb-6">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Scripts
        </a>

        <!-- Execution Card -->
        <div class="bg-surface-card border border-surface-border rounded-2xl overflow-hidden shadow-2xl">

            <!-- Header -->
            <div class="p-6 border-b border-surface-border">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
                    <div>
                        <h1 class="text-xl font-bold" x-text="scriptName">▶️ Running Script</h1>
                        <p class="text-sm text-slate-400 mt-1">
                            Status:
                            <span x-show="status === 'running'" class="text-warning font-medium">⚡ Running</span>
                            <span x-show="status === 'success'" class="text-success font-medium">✅ Completed</span>
                            <span x-show="status === 'stopped'" class="text-danger font-medium">⏹️ Stopped</span>
                            <span x-show="status === 'failed'" class="text-danger font-medium">❌ Failed</span>
                        </p>
                    </div>
                    <div class="flex gap-2">
                        <button x-show="status === 'running'" @click="stopExecution()"
                                class="bg-danger hover:bg-red-600 text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors inline-flex items-center gap-2 shadow-sm shadow-danger/20">
                            ⏹️ STOP
                        </button>
                        <button x-show="status !== 'running'" @click="rerun()"
                                class="bg-brand hover:bg-brand-hover text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors inline-flex items-center gap-2 shadow-sm shadow-brand/20">
                            🔄 Rerun
                        </button>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="mb-2 flex items-center justify-between text-sm">
                    <span class="text-slate-400" x-text="'Action ' + currentAction + '/' + totalActions"></span>
                    <span class="text-brand font-mono font-bold" x-text="Math.round(totalActions > 0 ? (currentAction / totalActions * 100) : 0) + '%'"></span>
                </div>
                <div class="h-2.5 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full progress-bar rounded-full" :style="'width: ' + (totalActions > 0 ? (currentAction / totalActions * 100) : 0) + '%'"></div>
                </div>

                <!-- Current Action Indicator -->
                <div x-show="status === 'running'" class="mt-4 bg-slate-800/50 rounded-xl p-4 border border-slate-700/30 flex items-center gap-3">
                    <div class="flex gap-1 shrink-0">
                        <span class="w-2 h-2 bg-brand rounded-full pulse-dot"></span>
                        <span class="w-2 h-2 bg-brand rounded-full pulse-dot"></span>
                        <span class="w-2 h-2 bg-brand rounded-full pulse-dot"></span>
                    </div>
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-slate-200 truncate" x-text="currentActionLabel">Executing action...</p>
                        <p class="text-xs text-slate-500 truncate" x-text="currentActionDetail"></p>
                    </div>
                </div>
            </div>

            <!-- Live Log -->
            <div class="p-6">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-semibold flex items-center gap-2">
                        <span class="w-6 h-6 rounded bg-slate-700 flex items-center justify-center text-xs">📋</span>
                        Live Log
                    </h2>
                    <div class="flex gap-2">
                        <span x-show="status === 'running'" class="text-xs text-slate-500 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-success rounded-full animate-pulse"></span> Streaming
                        </span>
                        <button @click="copyCurrentLogs()" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">📋 Copy</button>
                        <button @click="logs = []" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">🗑️ Clear</button>
                    </div>
                </div>

                <!-- Log Container -->
                <div id="logContainer"
                     class="bg-[#0A0E1A] border border-surface-border rounded-xl p-4 h-96 overflow-y-auto font-mono-custom text-xs leading-relaxed"
                     x-html="logsHTML()">
                </div>
            </div>

            <!-- Execution Summary -->
            <div x-show="status !== 'running' && totalActions > 0" x-transition
                 class="border-t border-surface-border px-6 py-4 bg-slate-900/50">
                <div class="grid grid-cols-4 gap-4 text-center">
                    <div>
                        <p class="text-2xl font-bold text-slate-200" x-text="totalActions"></p>
                        <p class="text-xs text-slate-500">Total Actions</p>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-success" x-text="successCount"></p>
                        <p class="text-xs text-slate-500">Success</p>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-danger" x-text="failCount"></p>
                        <p class="text-xs text-slate-500">Failed</p>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-200" x-text="elapsedTime + 's'"></p>
                        <p class="text-xs text-slate-500">Duration</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function execution() {
            return {
                scriptName: 'Login Instagram',
                status: 'running',
                currentAction: 0,
                totalActions: 5,
                currentActionLabel: 'Initializing...',
                currentActionDetail: '',
                logs: [],
                successCount: 0,
                failCount: 0,
                elapsedTime: 0,
                _elapsedTimer: null,
                _startTimestamp: null,
                _execIdCounter: 100,

                // History storage (auto-save only, viewing is in history.html)
                executionHistory: (() => {
                    try { return JSON.parse(localStorage.getItem('ngulo_exec_history') || '[]'); } catch(e) { return []; }
                })(),

                _persistHistory() {
                    try { localStorage.setItem('ngulo_exec_history', JSON.stringify(this.executionHistory)); } catch(e) {}
                },

                startSimulation() {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('script')) this.scriptName = this.scriptName;

                    // Seed random for more variety
                    const useFail = Math.random() > 0.6;
                    const failIdx = useFail ? Math.floor(Math.random() * 5) : -1;

                    const actions = [
                        { type: '🖼️', label: 'Screenshot Match [find_btn]', detail: '"login_btn.png" th=0.80, retry=3', success: failIdx !== 0 },
                        { type: '👆', label: 'Tap [tap_btn]', detail: 'from match: (540, 1200) via use_match_result', success: true },
                        { type: '📝', label: 'Type Text [ketik_user]', detail: '"myusername" speed=50ms/char', success: true },
                        { type: '👆', label: 'Tap [tap_login]', detail: 'coordinate (540, 960)', success: failIdx !== 3 },
                        { type: '⏳', label: 'Wait [delay_finish]', detail: '2000ms', success: true },
                    ];

                    this.totalActions = actions.length;
                    this.currentAction = 0;
                    this.status = 'running';
                    this.logs = [];
                    this.successCount = 0;
                    this.failCount = 0;
                    this.elapsedTime = 0;
                    this._startTimestamp = Date.now();

                    this.addLog('info', `▶️  Script "${this.scriptName}" started`);
                    this.addLog('info', `📋 Total actions: ${this.totalActions}, Repeat: 1x`);
                    this.addLog('info', '──────────────────────────────────────');

                    this._elapsedTimer = setInterval(() => {
                        if (this.status === 'running') this.elapsedTime = Math.round((Date.now() - this._startTimestamp) / 1000);
                    }, 250);

                    let delay = 0;
                    actions.forEach((action, idx) => {
                        delay += 800 + Math.random() * 1200;
                        setTimeout(() => {
                            if (this.status !== 'running') return;

                            this.currentAction = idx + 1;
                            this.currentActionLabel = `${action.label}...`;
                            this.currentActionDetail = action.detail;

                            this.addLog('info', `⚡ [#${idx + 1}] ${action.label} — ${action.detail}`);

                            setTimeout(() => {
                                if (this.status !== 'running') return;
                                if (action.success) {
                                    this.successCount++;
                                    this.addLog('success', `✅ [#${idx + 1}] ${action.label}: SUCCESS`);
                                } else {
                                    this.failCount++;
                                    this.addLog('error', `❌ [#${idx + 1}] ${action.label}: FAILED`);
                                }
                                if (idx === actions.length - 1) this.completeExecution();
                            }, 400 + Math.random() * 600);
                        }, delay);
                    });
                },

                addLog(level, message) {
                    const now = new Date();
                    const time = now.toLocaleTimeString('en-US', { hour12: false });
                    this.logs.push({ time, level, message });
                    this.$nextTick(() => {
                        const el = document.getElementById('logContainer');
                        if (el) el.scrollTop = el.scrollHeight;
                    });
                },

                logsHTML() {
                    if (this.logs.length === 0) {
                        return '<div class="text-slate-600 text-center py-8">Waiting for execution to start...</div>';
                    }
                    return this.logs.map(log => {
                        let color = 'text-slate-500';
                        if (log.level === 'success') color = 'text-green-400';
                        if (log.level === 'error') color = 'text-red-400';
                        if (log.level === 'info') color = 'text-slate-300';
                        return `<div class="log-entry py-0.5"><span class="text-slate-600">[${log.time}]</span> <span class="${color}">${log.message}</span></div>`;
                    }).join('');
                },

                completeExecution() {
                    this.status = 'success';
                    this.currentAction = this.totalActions;
                    this.elapsedTime = Math.round((Date.now() - this._startTimestamp) / 1000);
                    clearInterval(this._elapsedTimer);
                    this.addLog('info', '──────────────────────────────────────');
                    this.addLog('success', `✅ Execution completed in ${this.elapsedTime}s`);
                    this.addLog('info', `📊 ${this.successCount} success, ${this.failCount} failed`);
                    this.saveToHistory('success');
                    this.scrollLogs();
                },

                stopExecution() {
                    this.status = 'stopped';
                    this.elapsedTime = Math.round((Date.now() - this._startTimestamp) / 1000);
                    this.currentActionLabel = '';
                    this.currentActionDetail = '';
                    clearInterval(this._elapsedTimer);
                    this.addLog('error', `⏹️ Execution stopped by user at action #${this.currentAction}`);
                    this.saveToHistory('stopped');
                    this.scrollLogs();
                },

                // ---- HISTORY METHODS (save only; viewing at history.html) ----
                saveToHistory(finalStatus) {
                    const now = new Date();
                    const entry = {
                        id: ++this._execIdCounter,
                        scriptName: this.scriptName,
                        status: finalStatus,
                        date: now.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + now.toLocaleTimeString('en-US', { hour12: false }),
                        duration: this.elapsedTime,
                        totalActions: this.totalActions,
                        successes: this.successCount,
                        failures: this.failCount,
                        logs: this.logs.map((l, i) => ({ ...l, _idx: i })),
                        _expanded: false,
                    };
                    this.executionHistory.unshift(entry);
                    if (this.executionHistory.length > 50) this.executionHistory = this.executionHistory.slice(0, 50);
                    this._persistHistory();
                },

                copyCurrentLogs() {
                    const text = this.logs.map(l => `[${l.time}] ${l.message}`).join('\n');
                    navigator.clipboard.writeText(text).then(() => {
                        this.addLog('info', '📋 Logs copied to clipboard');
                        this.scrollLogs();
                    });
                },

                rerun() {
                    clearInterval(this._elapsedTimer);
                    this.$nextTick(() => this.startSimulation());
                },

                scrollLogs() {
                    this.$nextTick(() => {
                        const el = document.getElementById('logContainer');
                        if (el) el.scrollTop = el.scrollHeight;
                    });
                },
            };
        }
    </script>

</body>
</html>
