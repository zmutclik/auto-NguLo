<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-NguLo — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: { DEFAULT: '#0F172A', card: '#1E293B', border: '#334155', hover: '#263348' },
                        brand: { DEFAULT: '#6366F1', hover: '#5558E6' },
                        success: '#10B981', danger: '#EF4444', warning: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0F172A; color: #F1F5F9; }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="w-full max-w-md">

        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="animate-float inline-block mb-4">
                <div class="w-20 h-20 mx-auto bg-gradient-to-br from-brand to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-brand/30">
                    <span class="text-4xl">🤖</span>
                </div>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-brand to-purple-400 bg-clip-text text-transparent">
                Auto-NguLo
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Android Automation Manager</p>
        </div>

        <!-- Login Form -->
        <div class="bg-surface-card border border-surface-border rounded-2xl p-8 shadow-2xl"
             x-data="{ password: '', error: '', loading: false, showHint: false }"
             @submit.prevent="
                loading = true;
                setTimeout(() => {
                    if (password === '123456' || password === '') {
                        window.location.href = 'dashboard.html';
                    } else {
                        error = 'Password salah!';
                        $refs.card.classList.add('animate-shake');
                        setTimeout(() => $refs.card.classList.remove('animate-shake'), 500);
                        loading = false;
                    }
                }, 600);
             ">

            <!-- Lock Icon -->
            <div class="text-center mb-6">
                <div class="w-14 h-14 mx-auto bg-slate-700/50 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold mt-3">Masukkan Password</h2>
            </div>

            <!-- Error Alert -->
            <div x-show="error" x-transition
                 class="mb-4 bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg px-4 py-3 text-sm flex items-center gap-2">
                <span>⚠️</span>
                <span x-text="error"></span>
            </div>

            <!-- Form -->
            <form x-ref="card">
                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <input
                            :type="showHint ? 'text' : 'password'"
                            x-model="password"
                            class="w-full bg-slate-800 border border-surface-border rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all"
                            placeholder="●●●●●●●●"
                            autofocus
                        >
                        <button type="button" @click="showHint = !showHint"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                            <!-- Eye icon -->
                            <svg x-show="!showHint" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <!-- Eye-off icon -->
                            <svg x-show="showHint" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    :disabled="loading"
                    class="w-full bg-brand hover:bg-brand-hover disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg px-4 py-3 transition-all flex items-center justify-center gap-2 shadow-lg shadow-brand/25 hover:shadow-brand/40">
                    <!-- Login icon -->
                    <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    <!-- Spinner -->
                    <svg x-show="loading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span x-text="loading ? 'Memproses...' : 'LOGIN'"></span>
                </button>
            </form>

            <!-- Hint -->
            <p class="text-center text-xs text-slate-500 mt-6">
                Default password: <code class="bg-slate-800 px-2 py-0.5 rounded text-brand text-xs">123456</code>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-600 mt-6">
            v1.0.0 &middot; Running on Termux &middot; FastAPI
        </p>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
